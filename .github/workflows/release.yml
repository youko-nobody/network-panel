name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p release
          echo "$KEYSTORE_BASE64" | base64 --decode > release/network-panel-release.jks

      - name: Create signing properties
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cat > release/keystore.properties <<EOF
          storeFile=network-panel-release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk network-panel-${{ github.ref_name }}.apk

      - name: Prepare release notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## " version " - " { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes-body.md
          {
            echo "## 网络面板 ${GITHUB_REF_NAME}"
            echo
            echo "原生 Android 网络流量面板正式版。"
            echo
            echo "### 更新内容"
            echo
            if [ -s release-notes-body.md ]; then
              cat release-notes-body.md
            else
              echo "- 本版本包含稳定性与体验优化。"
            fi
            echo
            echo "### 下载"
            echo
            echo "点击下方 \`network-panel-${GITHUB_REF_NAME}.apk\` 即可下载 APK。"
            echo
            echo "### 安装说明"
            echo
            echo "Android 可能会提示“未知来源应用”，允许后即可安装。"
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: network-panel-${{ github.ref_name }}.apk
          name: 网络面板 ${{ github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: true
