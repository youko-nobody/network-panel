name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p release
          echo "$KEYSTORE_BASE64" | base64 --decode > release/network-panel-release.jks

      - name: Create signing properties
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cat > release/keystore.properties <<EOF
          storeFile=network-panel-release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk network-panel-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: network-panel-${{ github.ref_name }}.apk
          name: 网络面板 ${{ github.ref_name }}
          body: |
            ## 网络面板 ${{ github.ref_name }}

            原生 Android 网络流量面板正式版。

            ### 更新内容

            - 修复部分主题无法切换的问题
            - 优化右上角按钮在不同主题下的文字可见性
            - 将“秋叶”主题替换为更柔和的“浅秋”配色
            - 线路管理支持单条线路编辑和删除
            - 优化线路名称和链接输入框的文字对齐

            ### 下载

            点击下方 `network-panel-${{ github.ref_name }}.apk` 即可下载 APK。

            ### 安装说明

            Android 可能会提示“未知来源应用”，允许后即可安装。
          generate_release_notes: true
