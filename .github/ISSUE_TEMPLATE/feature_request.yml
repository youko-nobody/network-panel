name: Feature request
description: Suggest an improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What would you like to improve?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why
      description: Why is this useful?
