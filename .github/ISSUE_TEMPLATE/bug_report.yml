name: Bug report
description: Report a reproducible problem.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce it.
      placeholder: |
        1. Open...
        2. Tap...
        3. See...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: 1.0.0
  - type: input
    id: android
    attributes:
      label: Android version / device
      placeholder: Android 14, Pixel 8
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Please remove private information before uploading.
